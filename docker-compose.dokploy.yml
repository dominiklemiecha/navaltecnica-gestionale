# Compose per il deploy su Dokploy.
# - Nessuna porta esposta sull'host: il routing/HTTPS lo fa Traefik di Dokploy.
# - Il servizio "app" è collegato anche a dokploy-network così Traefik lo raggiunge.
# - Le migrazioni partono da sole all'avvio (docker/entrypoint-prod.sh).
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: prod
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      UPLOADS_DIR: /app/uploads
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: "3000"
    volumes:
      - uploads:/app/uploads
    networks:
      - default
      - dokploy-network

networks:
  dokploy-network:
    external: true

volumes:
  db_data:
  uploads:
